<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nulls Magic V2 - Text Colorizer</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #16181d;
            --accent-blue: #0088ff;
            --neon-glow: rgba(0, 136, 255, 0.6);
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* 🟢 بروفايل المستخدم بالزاوية العلوية */
        .profile-widget {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .profile-widget:hover {
            transform: scale(1.05);
        }

        .profile-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 10px var(--neon-glow);
            object-fit: cover;
            background-color: #222;
        }

        .profile-name {
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 4px;
            color: #fff;
            text-shadow: 0 0 5px rgba(0,136,255,0.5);
            max-width: 90px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            text-align: center;
            margin-top: 40px;
        }

        .header-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, #0088ff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 136, 255, 0.3);
        }

        .ai-btn {
            background: linear-gradient(135deg, #0088ff, #8a2be2);
            color: #fff;
            border: 1px solid rgba(0, 136, 255, 0.5);
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 136, 255, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .ai-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 22px rgba(0, 136, 255, 0.8);
        }

        /* الشريط الأسود المضيء */
        .input-box {
            position: relative;
            background-color: #000000;
            border: 2px solid var(--accent-blue);
            border-radius: 12px;
            padding: 8px 15px;
            box-shadow: 0 0 15px var(--neon-glow), inset 0 0 10px rgba(0, 136, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .input-box:focus-within {
            box-shadow: 0 0 25px var(--accent-blue), inset 0 0 15px rgba(0, 136, 255, 0.4);
        }

        .input-box input[type="text"] {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1.1rem;
            padding: 10px;
        }

        /* 3 دوائر الألوان */
        .color-pickers {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .color-pickers input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        .color-pickers input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-pickers input[type="color"]::-webkit-color-swatch {
            border: 2px solid #fff;
            border-radius: 50%;
        }

        /* منطقة المعاينة والنتيجة */
        .result-card {
            background-color: var(--card-bg);
            border: 1px solid #282c34;
            border-radius: 12px;
            padding: 20px;
            text-align: right;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .preview-title {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }

        .text-preview {
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 40px;
            word-break: break-all;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #0d0e12;
            border-radius: 8px;
        }

        .code-output-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px 12px;
        }

        .code-output {
            font-family: monospace;
            color: #00ff88;
            font-size: 0.95rem;
            direction: ltr;
            overflow-x: auto;
            white-space: nowrap;
            width: 80%;
        }

        .copy-btn {
            background-color: var(--accent-blue);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background-color: #0066cc;
        }

        /* 🟣 التصميم الذكي للنووافذ المنبثقة (Modals) والأنيميشن */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            position: relative;
            background: var(--card-bg);
            border: 1.5px solid var(--accent-blue);
            border-radius: 20px;
            padding: 30px 25px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 0 30px var(--neon-glow);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 12px;
            left: 18px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.8rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }

        .close-btn:hover {
            color: #fff;
            transform: scale(1.2);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: #fff;
            line-height: 1.6;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00d2ff, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-label {
            display: block;
            font-size: 0.95rem;
            color: #bbb;
            margin-bottom: 10px;
        }

        .custom-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--accent-blue);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            box-shadow: inset 0 0 8px rgba(0, 136, 255, 0.3);
        }

        .main-btn {
            background: linear-gradient(135deg, #0088ff, #00d2ff);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-glow);
            transition: all 0.3s ease;
            width: 100%;
        }

        .main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--accent-blue);
        }

        /* رفع وتغيير الصورة بالبروفايل */
        .avatar-upload-label {
            display: inline-block;
            position: relative;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .avatar-preview-edit {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px dashed var(--accent-blue);
            object-fit: cover;
            background: #000;
            transition: opacity 0.3s;
        }

        .avatar-upload-label:hover .avatar-preview-edit {
            opacity: 0.7;
        }

        .avatar-upload-hint {
            position: absolute;
            bottom: -5px;
            right: 50%;
            transform: translateX(50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid var(--accent-blue);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <!-- 🟢 دائرة البروفايل بالزاوية العلوية -->
    <div class="profile-widget" onclick="openProfileModal()">
        <img id="headerAvatar" class="profile-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=NullsUser" alt="Avatar">
        <span id="headerName" class="profile-name">زائر</span>
    </div>

    <div class="container">
        <div class="header-area">
            <h1>Nulls Magic</h1>
            <button class="ai-btn" onclick="openAiModal()">🤖 Null’s AI</button>
        </div>

        <!-- الشريط الأسود المضيء -->
        <div class="input-box">
            <input type="text" id="userInput" placeholder="اكتب النص هنا..." value="Nulls Magic">
            
            <div class="color-pickers">
                <input type="color" id="color1" value="#0088ff" title="اللون الأول">
                <input type="color" id="color2" value="#8a2be2" title="اللون الثاني">
                <input type="color" id="color3" value="#ff007f" title="اللون الثالث">
            </div>
        </div>

        <!-- المعاينة وأكواد نولز -->
        <div class="result-card">
            <div class="preview-title">الشكل داخل اللعبة:</div>
            <div class="text-preview" id="textPreview"></div>

            <div class="preview-title">الكود المنسوخ (Nulls Colors):</div>
            <div class="code-output-container">
                <div class="code-output" id="codeOutput"></div>
                <button class="copy-btn" onclick="copyCode()">نسخ الكود</button>
            </div>
        </div>
    </div>

    <!-- 🔵 مودال الترحيب والتسجيل التلقائي عند فتح الموقع -->
    <div class="modal" id="welcomeModal">
        <div class="modal-content">
            <div class="modal-title">
                يأهلا وسهلا نورت الموقع Null’s Magic V2 اول موقع عربي لنولز برول !
            </div>
            
            <label class="input-label">اكتب اسمك لو سمحت ☺️❤️</label>
            <input type="text" id="welcomeNameInput" class="custom-input" placeholder="اسمك الكريم..." autofocus>
            
            <button class="main-btn" onclick="submitWelcome()">تسجيل الدخول</button>
        </div>
    </div>

    <!-- 🟣 مودال تعديل البروفايل والصورة -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('profileModal')">&times;</button>
            <div class="modal-title">تعديل الملف الشخصي</div>

            <label class="avatar-upload-label" title="اضغط لتغيير الصورة">
                <img id="editAvatarPreview" class="avatar-preview-edit" src="" alt="Avatar Edit">
                <span class="avatar-upload-hint">📷 تغيير</span>
                <input type="file" id="imageUploader" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            </label>

            <label class="input-label">اسم المستخدم:</label>
            <input type="text" id="editNameInput" class="custom-input">

            <button class="main-btn" onclick="saveProfile()">حفظ التعديلات</button>
        </div>
    </div>

    <!-- 🔴 نافذة تنبيه AI Magic -->
    <div class="modal" id="aiModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('aiModal')">&times;</button>
            <div style="font-size: 1.1rem; color: #fff; margin-top: 15px; line-height: 1.5;">
                اوه نعتذر على ذلك لاكن Ai Magic باقي ماجاء للأسف
            </div>
        </div>
    </div>

    <script>
        const userInput = document.getElementById('userInput');
        const color1Input = document.getElementById('color1');
        const color2Input = document.getElementById('color2');
        const color3Input = document.getElementById('color3');
        const textPreview = document.getElementById('textPreview');
        const codeOutput = document.getElementById('codeOutput');

        // بيانات البروفايل
        let currentUser = {
            name: "زائر",
            avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=NullsUser"
        };

        // تشغيل الترحيب مباشرة عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', () => {
            const savedData = localStorage.getItem('nulls_user');
            if (savedData) {
                currentUser = JSON.parse(savedData);
                updateProfileUI();
            } else {
                openModal('welcomeModal');
            }
        });

        function updateProfileUI() {
            document.getElementById('headerName').innerText = currentUser.name;
            document.getElementById('headerAvatar').src = currentUser.avatar;
            document.getElementById('editAvatarPreview').src = currentUser.avatar;
            document.getElementById('editNameInput').value = currentUser.name;
        }

        function submitWelcome() {
            const nameVal = document.getElementById('welcomeNameInput').value.trim();
            if (nameVal) {
                currentUser.name = nameVal;
            }
            saveToStorage();
            closeModal('welcomeModal');
        }

        function saveProfile() {
            const newName = document.getElementById('editNameInput').value.trim();
            if (newName) {
                currentUser.name = newName;
            }
            saveToStorage();
            closeModal('profileModal');
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    currentUser.avatar = evt.target.result;
                    document.getElementById('editAvatarPreview').src = currentUser.avatar;
                }
                reader.readAsDataURL(file);
            }
        }

        function saveToStorage() {
            localStorage.setItem('nulls_user', JSON.stringify(currentUser));
            updateProfileUI();
        }

        // إدارة المودالات بمرونة
        function openModal(id) {
            const m = document.getElementById(id);
            m.style.display = 'flex';
            setTimeout(() => m.classList.add('show'), 10);
        }

        function closeModal(id) {
            const m = document.getElementById(id);
            m.classList.remove('show');
            setTimeout(() => m.style.display = 'none', 300);
        }

        function openAiModal() { openModal('aiModal'); }
        function openProfileModal() { openModal('profileModal'); }

        // كود تحويل الألوان والتدرجات
        function hexToRgb(hex) {
            const bigint = parseInt(hex.replace('#', ''), 16);
            return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
        }

        function interpolateColor(c1Hex, c2Hex, factor) {
            const c1 = hexToRgb(c1Hex);
            const c2 = hexToRgb(c2Hex);
            const r = Math.round(c1.r + factor * (c2.r - c1.r)).toString(16).padStart(2, '0');
            const g = Math.round(c1.g + factor * (c2.g - c1.g)).toString(16).padStart(2, '0');
            const b = Math.round(c1.b + factor * (c2.b - c1.b)).toString(16).padStart(2, '0');
            return `${r}${g}${b}`;
        }

        function get3PointGradientColor(factor) {
            if (factor <= 0.5) {
                return interpolateColor(color1Input.value, color2Input.value, factor * 2);
            } else {
                return interpolateColor(color2Input.value, color3Input.value, (factor - 0.5) * 2);
            }
        }

        function generateGradientText() {
            const text = userInput.value;
            if (!text) {
                textPreview.innerHTML = '';
                codeOutput.innerText = '';
                return;
            }

            let previewHTML = '';
            let generatedCode = '';
            const len = text.length;

            for (let i = 0; i < len; i++) {
                const char = text[i];
                if (char === ' ') {
                    previewHTML += ' ';
                    generatedCode += ' ';
                    continue;
                }

                const factor = len > 1 ? i / (len - 1) : 0;
                const hexColor = get3PointGradientColor(factor);

                generatedCode += `<c${hexColor}>${char}</c>`;
                previewHTML += `<span style="color: #${hexColor}">${char}</span>`;
            }

            textPreview.innerHTML = previewHTML;
            codeOutput.innerText = generatedCode;
        }

        function copyCode() {
            const code = codeOutput.innerText;
            if (!code) return;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.innerText = 'تم النسخ!';
                btn.style.backgroundColor = '#00cc66';
                setTimeout(() => {
                    btn.innerText = 'نسخ الكود';
                    btn.style.backgroundColor = 'var(--accent-blue)';
                }, 1500);
            });
        }

        userInput.addEventListener('input', generateGradientText);
        color1Input.addEventListener('input', generateGradientText);
        color2Input.addEventListener('input', generateGradientText);
        color3Input.addEventListener('input', generateGradientText);

        generateGradientText();
    </script>
</body>
</html>
