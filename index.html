<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع العربي الاول ل الوان سحريه بنولز - Text Colorizer</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #16181d;
            --accent-blue: #0088ff;
            --neon-glow: rgba(0, 136, 255, 0.6);
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            text-align: center;
        }

        .header-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, #0088ff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 136, 255, 0.3);
        }

        .ai-btn {
            background: linear-gradient(135deg, #8a2be2, #0088ff);
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 12px rgba(138, 43, 226, 0.5);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
        }

        /* الشريط الأسود ذو الحواف الزرقاء الماعة */
        .input-box {
            position: relative;
            background-color: #000000;
            border: 2px solid var(--accent-blue);
            border-radius: 12px;
            padding: 8px 15px;
            box-shadow: 0 0 15px var(--neon-glow), inset 0 0 10px rgba(0, 136, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .input-box:focus-within {
            box-shadow: 0 0 25px var(--accent-blue), inset 0 0 15px rgba(0, 136, 255, 0.4);
        }

        .input-box input[type="text"] {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1.1rem;
            padding: 10px;
        }

        /* 3 دوائر ألوان */
        .color-pickers {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .color-pickers input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        .color-pickers input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-pickers input[type="color"]::-webkit-color-swatch {
            border: 2px solid #fff;
            border-radius: 50%;
        }

        /* منطقة المعاينة والنتيجة */
        .result-card {
            background-color: var(--card-bg);
            border: 1px solid #282c34;
            border-radius: 12px;
            padding: 20px;
            text-align: right;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .preview-title {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }

        .text-preview {
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 40px;
            word-break: break-all;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #0d0e12;
            border-radius: 8px;
        }

        .code-output-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px 12px;
        }

        .code-output {
            font-family: monospace;
            color: #00ff88;
            font-size: 0.95rem;
            direction: ltr;
            overflow-x: auto;
            white-space: nowrap;
            width: 80%;
        }

        .copy-btn {
            background-color: var(--accent-blue);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background-color: #0066cc;
        }

        /* نافذة AI Magic Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--accent-blue);
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            text-align: right;
            box-shadow: 0 0 20px var(--neon-glow);
        }

        .modal-content h2 {
            margin-bottom: 15px;
            color: #fff;
        }

        .modal-content input[type="text"], .modal-content input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #000;
            color: #fff;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .btn-sec {
            background: #444;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-area">
            <h1>Nulls Magic</h1>
            <button class="ai-btn" onclick="openAiModal()">✨ AI Magic</button>
        </div>

        <!-- شريط النص والـ 3 ألوان -->
        <div class="input-box">
            <input type="text" id="userInput" placeholder="اكتب النص هنا..." value="Nulls Magic">
            
            <div class="color-pickers">
                <input type="color" id="color1" value="#0088ff" title="اللون الأول">
                <input type="color" id="color2" value="#8a2be2" title="اللون الأوسط">
                <input type="color" id="color3" value="#ff007f" title="اللون الثالث">
            </div>
        </div>

        <!-- معاينة النتيجة والكود -->
        <div class="result-card">
            <div class="preview-title">الشكل داخل اللعبة:</div>
            <div class="text-preview" id="textPreview"></div>

            <div class="preview-title">الكود المنسوخ (Nulls Colors):</div>
            <div class="code-output-container">
                <div class="code-output" id="codeOutput"></div>
                <button class="copy-btn" onclick="copyCode()">نسخ الكود</button>
            </div>
        </div>
    </div>

    <!-- نافذة الذكاء الاصطناعي -->
    <div class="modal" id="aiModal">
        <div class="modal-content">
            <h2>✨ AI Magic</h2>
            <p style="font-size:0.85rem; color:#aaa; margin-bottom:12px;">وصف الثيم أو اختر صورة لاستخراج 3 ألوان:</p>

            <input type="text" id="aiPrompt" placeholder="مثال: نار، نيون لايم، ثيم دراغون بول...">
            <input type="file" id="aiImage" accept="image/*">

            <div class="modal-actions">
                <button class="btn-sec" onclick="closeAiModal()">إلغاء</button>
                <button class="copy-btn" onclick="processAi()">توليد الألوان</button>
            </div>
        </div>
    </div>

    <script>
        const userInput = document.getElementById('userInput');
        const color1Input = document.getElementById('color1');
        const color2Input = document.getElementById('color2');
        const color3Input = document.getElementById('color3');
        const textPreview = document.getElementById('textPreview');
        const codeOutput = document.getElementById('codeOutput');

        function hexToRgb(hex) {
            const bigint = parseInt(hex.replace('#', ''), 16);
            return {
                r: (bigint >> 16) & 255,
                g: (bigint >> 8) & 255,
                b: bigint & 255
            };
        }

        function interpolateColor(c1Hex, c2Hex, factor) {
            const c1 = hexToRgb(c1Hex);
            const c2 = hexToRgb(c2Hex);
            const r = Math.round(c1.r + factor * (c2.r - c1.r)).toString(16).padStart(2, '0');
            const g = Math.round(c1.g + factor * (c2.g - c1.g)).toString(16).padStart(2, '0');
            const b = Math.round(c1.b + factor * (c2.b - c1.b)).toString(16).padStart(2, '0');
            return `${r}${g}${b}`;
        }

        // حساب التدرج بناءً على 3 ألوان
        function get3PointGradientColor(factor) {
            if (factor <= 0.5) {
                return interpolateColor(color1Input.value, color2Input.value, factor * 2);
            } else {
                return interpolateColor(color2Input.value, color3Input.value, (factor - 0.5) * 2);
            }
        }

        function generateGradientText() {
            const text = userInput.value;
            if (!text) {
                textPreview.innerHTML = '';
                codeOutput.innerText = '';
                return;
            }

            let previewHTML = '';
            let generatedCode = '';
            const len = text.length;

            for (let i = 0; i < len; i++) {
                const char = text[i];
                if (char === ' ') {
                    previewHTML += ' ';
                    generatedCode += ' ';
                    continue;
                }

                const factor = len > 1 ? i / (len - 1) : 0;
                const hexColor = get3PointGradientColor(factor);

                generatedCode += `<c${hexColor}>${char}</c>`;
                previewHTML += `<span style="color: #${hexColor}">${char}</span>`;
            }

            textPreview.innerHTML = previewHTML;
            codeOutput.innerText = generatedCode;
        }

        function copyCode() {
            const code = codeOutput.innerText;
            if (!code) return;
            
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.innerText = 'تم النسخ!';
                btn.style.backgroundColor = '#00cc66';
                setTimeout(() => {
                    btn.innerText = 'نسخ الكود';
                    btn.style.backgroundColor = 'var(--accent-blue)';
                }, 1500);
            });
        }

        /* التحكم بـ AI Modal */
        function openAiModal() { document.getElementById('aiModal').style.display = 'flex'; }
        function closeAiModal() { document.getElementById('aiModal').style.display = 'none'; }

        function processAi() {
            const prompt = document.getElementById('aiPrompt').value.toLowerCase();
            const imageInput = document.getElementById('aiImage');

            // إذا تم اختيار صورة
            if (imageInput.files && imageInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        
                        // سحب 3 ألوان من أماكن مختلفة بالصورة
                        const p1 = ctx.getImageData(10, 10, 1, 1).data;
                        const p2 = ctx.getImageData(Math.floor(img.width/2), Math.floor(img.height/2), 1, 1).data;
                        const p3 = ctx.getImageData(img.width - 10, img.height - 10, 1, 1).data;

                        color1Input.value = `#${((1<<24)+(p1[0]<<16)+(p1[1]<<8)+p2[2]).toString(16).slice(1)}`;
                        color2Input.value = `#${((1<<24)+(p2[0]<<16)+(p2[1]<<8)+p2[2]).toString(16).slice(1)}`;
                        color3Input.value = `#${((1<<24)+(p3[0]<<16)+(p3[1]<<8)+p3[2]).toString(16).slice(1)}`;
                        
                        generateGradientText();
                        closeAiModal();
                    }
                }
                reader.readAsDataURL(imageInput.files[0]);
                return;
            }

            // اقتراحات الذكاء الاصطناعي المبسطة بناءً على الوصف النصي
            if (prompt.includes('نار') || prompt.includes('fire')) {
                color1Input.value = '#ff0000'; color2Input.value = '#ff7700'; color3Input.value = '#ffea00';
            } else if (prompt.includes('ثلج') || prompt.includes('ice')) {
                color1Input.value = '#00ffff'; color2Input.value = '#0088ff'; color3Input.value = '#ffffff';
            } else if (prompt.includes('سام') || prompt.includes('toxic') || prompt.includes('لايم')) {
                color1Input.value = '#00ff22'; color2Input.value = '#a6ff00'; color3Input.value = '#004411';
            } else {
                // تلوين عشوائي متناسق كـ AI Suggestion
                color1Input.value = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                color2Input.value = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                color3Input.value = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            }

            generateGradientText();
            closeAiModal();
        }

        // الاستماع للتغييرات
        userInput.addEventListener('input', generateGradientText);
        color1Input.addEventListener('input', generateGradientText);
        color2Input.addEventListener('input', generateGradientText);
        color3Input.addEventListener('input', generateGradientText);

        generateGradientText();
    </script>
</body>
</html>
