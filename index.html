<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Null's Magic V2</title>
    <style>
        :root {
            --bg-dark: #0d0e12;
            --card-bg: #16181d;
            --blue-accent: #0088ff;
            --purple-accent: #8a2be2;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الشريط العلوي */
        .navbar {
            width: 100%;
            background: #111318;
            border-bottom: 1px solid rgba(0, 136, 255, 0.3);
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .nav-btn {
            padding: 9px 22px;
            border-radius: 20px;
            background: #1a1d24;
            color: var(--text-sub);
            cursor: pointer;
            font-weight: bold;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .nav-btn.active {
            background: var(--blue-accent);
            color: #fff;
            box-shadow: 0 0 12px rgba(0, 136, 255, 0.4);
        }

        /* ويدجت البروفايل العلوي */
        .profile-widget {
            position: absolute;
            top: 10px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 136, 255, 0.3);
        }

        .profile-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--blue-accent);
            object-fit: cover;
            background: #222;
        }

        .profile-name {
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* الحاوية والأقسام */
        .section {
            width: 100%;
            max-width: 750px;
            display: none;
            padding: 25px 15px;
            flex-direction: column;
            align-items: center;
        }

        .section.active {
            display: flex;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--blue-accent);
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 136, 255, 0.3);
        }

        .ai-btn {
            background: linear-gradient(135deg, var(--blue-accent), var(--purple-accent));
            color: #fff;
            border: none;
            padding: 9px 20px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(138, 43, 226, 0.3);
        }

        /* أدوات الألوان */
        .input-box {
            width: 100%;
            background: #000;
            border: 2px solid var(--blue-accent);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-box input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1.1rem;
        }

        .color-pickers {
            display: flex;
            gap: 6px;
        }

        .color-pickers input[type="color"] {
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        .result-card {
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 18px;
            border: 1px solid rgba(0, 136, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .preview {
            font-size: 1.3rem;
            font-weight: bold;
            min-height: 45px;
            background: var(--bg-dark);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .code-box {
            display: flex;
            justify-content: space-between;
            background: #000;
            border-radius: 8px;
            padding: 8px 12px;
            align-items: center;
        }

        .code-out {
            font-family: monospace;
            color: #00ff88;
            direction: ltr;
            overflow-x: auto;
            width: 78%;
            white-space: nowrap;
        }

        .copy-btn {
            background: var(--blue-accent);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* نظام الرسائل والتطبيق */
        .chat-app {
            width: 100%;
            height: 550px;
            background: var(--card-bg);
            border: 1px solid var(--blue-accent);
            border-radius: 15px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .chat-sidebar {
            width: 34%;
            background: #111318;
            border-left: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
        }

        .add-box {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .add-box input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 6px;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
        }

        .btn-sm {
            background: var(--blue-accent);
            border: none;
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            white-space: nowrap;
        }

        .friends-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .friend-item {
            padding: 8px;
            background: #1a1d24;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .friend-item.active {
            background: var(--blue-accent);
        }

        .friend-item img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
        }

        .chat-header {
            padding: 12px 15px;
            background: #16181d;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-wrap {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .msg-wrap.mine { align-self: flex-start; }
        .msg-wrap.other { align-self: flex-end; }

        .msg-head {
            font-size: 0.72rem;
            color: var(--text-sub);
            margin-bottom: 3px;
            cursor: pointer;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .msg-head img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .role-tag {
            background: #333;
            color: #ffcc00;
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: bold;
        }

        .msg-body {
            padding: 9px 13px;
            border-radius: 10px;
            font-size: 0.92rem;
            background: #222630;
            word-break: break-word;
        }

        .msg-wrap.mine .msg-body {
            background: var(--blue-accent);
        }

        .msg-body img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 5px;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            background: #16181d;
            gap: 8px;
            align-items: center;
            border-top: 1px solid #222;
        }

        .chat-input input[type="text"] {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 8px;
            border-radius: 6px;
            outline: none;
        }

        /* النوافذ المنبثقة Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .modal.show { display: flex; }

        .modal-card {
            background: var(--card-bg);
            border: 1px solid var(--blue-accent);
            border-radius: 15px;
            padding: 22px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 136, 255, 0.2);
        }

        .close {
            position: absolute;
            top: 10px;
            left: 15px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.6rem;
            cursor: pointer;
        }

        .inp {
            width: 100%;
            background: #000;
            border: 1px solid var(--blue-accent);
            padding: 9px;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 10px;
            outline: none;
        }

        .btn-main {
            background: var(--blue-accent);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 18px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }

        .btn-orange {
            background: #ff9900;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 18px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 8px;
        }

        .btn-red {
            background: #ff3333;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 18px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="nav-btn active" onclick="tab('colors', this)">Null’s Magic 🎨</button>
        <button class="nav-btn" onclick="tab('chat', this)">الرسائل 💬</button>
    </div>

    <div class="profile-widget" onclick="openProfile(currentUser.username)">
        <img id="headAvatar" class="profile-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=Nulls" alt="Avatar">
        <span id="headName" class="profile-name">زائر</span>
    </div>

    <div id="colors" class="section active">
        <h1>Nulls Magic</h1>
        <button class="ai-btn" onclick="openM('aiM')">🤖 Null’s AI</button>

        <div class="input-box">
            <input type="text" id="uInput" placeholder="اكتب النص هنا..." value="Nulls Magic">
            <div class="color-pickers">
                <input type="color" id="c1" value="#0088ff">
                <input type="color" id="c2" value="#8a2be2">
                <input type="color" id="c3" value="#ff007f">
            </div>
        </div>

        <div class="result-card">
            <div class="preview" id="pOut"></div>
            <div class="code-box">
                <div class="code-out" id="cOut"></div>
                <button class="copy-btn" onclick="copyC()">نسخ الكود</button>
            </div>
        </div>
    </div>

    <div id="chat" class="section">
        <div class="chat-app">
            <div class="chat-sidebar">
                <div class="add-box">
                    <input type="text" id="fInp" placeholder="اسم اليوزر...">
                    <button class="btn-sm" onclick="addF()">إضافة</button>
                </div>
                <button class="btn-sm" style="background:var(--purple-accent); margin-bottom:8px;" onclick="openM('gM')">➕ إنشاء قروب</button>
                <div class="friends-list" id="fList"></div>
            </div>
            <div class="chat-main">
                <div class="chat-header">
                    <span id="cHead">اختر محادثة</span>
                    <button id="gSetBtn" class="btn-sm" style="display:none;" onclick="openGSet()">إدارة القروب ⚙️</button>
                </div>
                <div class="chat-messages" id="cMsgs"></div>
                <div class="chat-input">
                    <label style="cursor:pointer;" title="صورة">📷<input type="file" id="imgInp" accept="image/*" style="display:none;" onchange="sendImg(event)"></label>
                    <input type="text" id="mInp" placeholder="ارسل رسالة..." onkeypress="if(event.key==='Enter') sendM()">
                    <button class="btn-sm" onclick="sendM()">إرسال</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="authM">
        <div class="modal-card">
            <h3 style="color:var(--blue-accent); margin-bottom:12px;">أهلاً بك في Null’s Magic V2</h3>
            <div id="err" style="color:#ff3333; font-size:0.8rem; display:none; margin-bottom:8px;"></div>
            <input type="text" id="aDisp" class="inp" placeholder="الاسم الظاهر">
            <input type="text" id="aUser" class="inp" placeholder="اسم المستخدم (بالإنجليزي)">
            <input type="password" id="aPass" class="inp" placeholder="كلمة السر">
            <button class="btn-main" onclick="authSubmit()">دخول / تسجيل جديد</button>
        </div>
    </div>

    <div class="modal" id="gM">
        <div class="modal-card">
            <button class="close" onclick="closeM('gM')">&times;</button>
            <h3>إنشاء مجموعة جديدة</h3>
            <input type="text" id="gName" class="inp" placeholder="اسم القروب..." style="margin-top:12px;">
            <div id="gFriends" style="text-align:right; max-height:130px; overflow-y:auto; margin-bottom:10px;"></div>
            <button class="btn-main" onclick="createG()">إنشاء</button>
        </div>
    </div>

    <div class="modal" id="gSetM">
        <div class="modal-card">
            <button class="close" onclick="closeM('gSetM')">&times;</button>
            <h3>إدارة القروب</h3>
            <input type="text" id="editGName" class="inp" placeholder="اسم القروب الجديد" style="margin-top:12px;">
            <button class="btn-main" id="renGBtn" onclick="renameG()">تعديل الاسم</button>
            <div id="gMemList" style="text-align:right; margin:12px 0; max-height:150px; overflow-y:auto;"></div>
            <button class="btn-red" id="delGBtn" style="display:none;" onclick="delG()">حذف القروب 🗑️</button>
        </div>
    </div>

    <div class="modal" id="pM">
        <div class="modal-card">
            <button class="close" onclick="closeM('pM')">&times;</button>
            <h3 id="pTitle">الملف الشخصي</h3>
            <img id="pImg" style="width:75px; height:75px; border-radius:50%; margin:10px 0; border:2px solid var(--blue-accent);" src="">
            <input type="text" id="pNameInp" class="inp" placeholder="الاسم الظاهر">
            <button class="btn-main" id="pSaveBtn" onclick="saveP()">حفظ التغييرات</button>
            <button class="btn-orange" id="pPromoteBtn" style="display:none;" onclick="promoteU()">ترقية العضو ⬆️</button>
            <button class="btn-red" id="pOutBtn" onclick="logout()">تسجيل الخروج</button>
        </div>
    </div>

    <div class="modal" id="aiM">
        <div class="modal-card">
            <button class="close" onclick="closeM('aiM')">&times;</button>
            <p style="margin-top:15px; font-weight:bold;">🤖 ميزة Null's AI قيد التطوير والتحديث حالياً!</p>
        </div>
    </div>

    <script>
        let currentUser = null, activeChatId = null, activeType = 'self', targetUser = null;
        let dbU = JSON.parse(localStorage.getItem('n_users_db') || '{}');
        let dbG = JSON.parse(localStorage.getItem('n_groups_db') || '{}');
        let dbC = JSON.parse(localStorage.getItem('n_chats_db') || '{}');

        window.onload = () => {
            let session = localStorage.getItem('n_sess_token');
            if(session && dbU[session]) { 
                currentUser = dbU[session]; 
                updateUI(); 
            } else { 
                openM('authM'); 
            }
            genColors();
        };

        function tab(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function authSubmit() {
            let u = document.getElementById('aUser').value.trim();
            let p = document.getElementById('aPass').value.trim();
            let d = document.getElementById('aDisp').value.trim();

            if(!u || !p) return showErr("يرجى إدخال اسم المستخدم وكلمة السر!");
            if(dbU[u]) {
                if(dbU[u].password === p) { currentUser = dbU[u]; }
                else return showErr("كلمة السر غير صحيحة!");
            } else {
                currentUser = { 
                    username: u, 
                    displayName: d || u, 
                    password: p, 
                    avatar: "https://api.dicebear.com/7.x/bottts/svg?seed="+u, 
                    friends:[], 
                    groups:[] 
                };
                dbU[u] = currentUser;
                localStorage.setItem('n_users_db', JSON.stringify(dbU));
            }
            localStorage.setItem('n_sess_token', u);
            updateUI();
            closeM('authM');
        }

        function showErr(m) { 
            let e = document.getElementById('err'); 
            e.innerText = m; 
            e.style.display = 'block'; 
        }

        function updateUI() {
            document.getElementById('headName').innerText = currentUser.displayName;
            document.getElementById('headAvatar').src = currentUser.avatar;
            renderList();
        }

        function addF() {
            let f = document.getElementById('fInp').value.trim();
            if(!f || !dbU[f] || f === currentUser.username) return;
            if(!currentUser.friends.includes(f)) { 
                currentUser.friends.push(f); 
                dbU[currentUser.username] = currentUser; 
                localStorage.setItem('n_users_db', JSON.stringify(dbU)); 
            }
            document.getElementById('fInp').value = '';
            renderList();
        }

        function renderList() {
            let list = document.getElementById('fList'), gBox = document.getElementById('gFriends');
            list.innerHTML = ''; gBox.innerHTML = '';

            let self = document.createElement('div');
            self.className = 'friend-item' + (activeChatId === 'self' ? ' active' : '');
            self.innerHTML = `<span>👤 رسائلي الخاصة (نفسي)</span>`;
            self.onclick = () => selChat('self', 'self');
            list.appendChild(self);

            currentUser.groups?.forEach(gId => {
                if(dbG[gId]) {
                    let d = document.createElement('div');
                    d.className = 'friend-item' + (activeChatId === gId ? ' active' : '');
                    d.innerHTML = `👥 <span>${dbG[gId].name}</span>`;
                    d.onclick = () => selChat(gId, 'group');
                    list.appendChild(d);
                }
            });

            currentUser.friends?.forEach(f => {
                if(dbU[f]) {
                    let d = document.createElement('div');
                    d.className = 'friend-item' + (activeChatId === f ? ' active' : '');
                    d.innerHTML = `<img src="${dbU[f].avatar}"> <span>${dbU[f].displayName}</span>`;
                    d.onclick = () => selChat(f, 'friend');
                    list.appendChild(d);
                    gBox.innerHTML += `<label style="display:block; margin-bottom:4px;"><input type="checkbox" value="${f}"> ${dbU[f].displayName}</label>`;
                }
            });
        }

        function createG() {
            let name = document.getElementById('gName').value.trim();
            if(!name) return;
            let checked = Array.from(document.querySelectorAll('#gFriends input:checked')).map(c => c.value);
            checked.push(currentUser.username);

            let gId = 'g_' + Date.now();
            let roles = {}; roles[currentUser.username] = "الرئيس";

            dbG[gId] = { id: gId, name: name, owner: currentUser.username, members: checked, roles: roles };
            checked.forEach(u => { 
                if(dbU[u]) { 
                    dbU[u].groups = dbU[u].groups || []; 
                    dbU[u].groups.push(gId); 
                } 
            });

            localStorage.setItem('n_groups_db', JSON.stringify(dbG));
            localStorage.setItem('n_users_db', JSON.stringify(dbU));
            closeM('gM');
            renderList();
        }

        function selChat(id, type) {
            activeChatId = id; activeType = type;
            renderList();
            document.getElementById('gSetBtn').style.display = (type === 'group') ? 'block' : 'none';
            document.getElementById('cHead').innerText = (type==='group') ? dbG[id]?.name : (type==='friend'? dbU[id]?.displayName : "ملاحظاتي الشخصية");
            renderMsgs();
        }

        function getKey() {
            if(activeType === 'self') return 'self_' + currentUser.username;
            if(activeType === 'group') return activeChatId;
            return [currentUser.username, activeChatId].sort().join('_');
        }

        function sendM(img = null) {
            let txt = document.getElementById('mInp').value.trim();
            if(!txt && !img) return;
            let k = getKey(); if(!k) return;

            dbC[k] = dbC[k] || [];
            dbC[k].push({ sender: currentUser.username, name: currentUser.displayName, av: currentUser.avatar, text: txt, img: img });
            document.getElementById('mInp').value = '';

            if(activeType === 'self') {
                setTimeout(() => {
                    localStorage.setItem('n_chats_db', JSON.stringify(dbC));
                    renderMsgs();
                }, 100);
            }
            localStorage.setItem('n_chats_db', JSON.stringify(dbC));
            renderMsgs();
        }

        function sendImg(e) {
            let file = e.target.files[0];
            if(file) {
                let r = new FileReader();
                r.onload = (evt) => sendM(evt.target.result);
                r.readAsDataURL(file);
            }
        }

        function renderMsgs() {
            let box = document.getElementById('cMsgs'); box.innerHTML = '';
            let k = getKey(); if(!k || !dbC[k]) return;
            let group = (activeType === 'group') ? dbG[activeChatId] : null;

            dbC[k].forEach(m => {
                let mine = (m.sender === currentUser.username);
                let wrap = document.createElement('div');
                wrap.className = 'msg-wrap ' + (mine ? 'mine' : 'other');

                let head = document.createElement('div');
                head.className = 'msg-head';
                head.onclick = () => openProfile(m.sender);

                let rTag = (group && group.roles && group.roles[m.sender]) ? `<span class="role-tag">${group.roles[m.sender]}</span>` : '';
                head.innerHTML = `<img src="${m.av}"> <span>${m.name}</span> ${rTag}`;

                let body = document.createElement('div');
                body.className = 'msg-body';
                if(m.text) body.innerText = m.text;
                if(m.img) body.innerHTML += `<br><img src="${m.img}">`;

                wrap.appendChild(head); wrap.appendChild(body);
                box.appendChild(wrap);
            });
            box.scrollTop = box.scrollHeight;
        }

        function openProfile(u) {
            targetUser = u;
            let isSelf = (u === currentUser.username);
            let uData = dbU[u] || { displayName: currentUser.displayName, avatar: currentUser.avatar };

            document.getElementById('pTitle').innerText = isSelf ? "الملف الشخصي" : "معاينة الملف";
            document.getElementById('pImg').src = uData.avatar;
            document.getElementById('pNameInp').value = uData.displayName;
            document.getElementById('pNameInp').disabled = !isSelf;
            document.getElementById('pSaveBtn').style.display = isSelf ? 'block' : 'none';
            document.getElementById('pOutBtn').style.display = isSelf ? 'block' : 'none';

            if(activeType === 'group' && dbG[activeChatId] && !isSelf) {
                let myRole = dbG[activeChatId].roles[currentUser.username] || "عضو";
                document.getElementById('pPromoteBtn').style.display = (myRole === "الرئيس") ? 'block' : 'none';
            } else {
                document.getElementById('pPromoteBtn').style.display = 'none';
            }
            openM('pM');
        }

        function promoteU() {
            if(!activeChatId || activeType !== 'group' || !targetUser) return;
            let g = dbG[activeChatId];
            let cur = g.roles[targetUser] || "عضو";
            if(cur === "عضو") g.roles[targetUser] = "وكيل";
            else if(cur === "وكيل") g.roles[targetUser] = "نائب";

            localStorage.setItem('n_groups_db', JSON.stringify(dbG));
            closeM('pM');
            renderMsgs();
        }

        function openGSet() {
            let g = dbG[activeChatId]; if(!g) return;
            document.getElementById('editGName').value = g.name;
            let myRole = g.roles[currentUser.username] || "عضو";
            let canManage = (myRole === "الرئيس" || myRole === "نائب");

            document.getElementById('renGBtn').style.display = canManage ? 'block' : 'none';
            document.getElementById('delGBtn').style.display = (myRole === "الرئيس") ? 'block' : 'none';

            let list = document.getElementById('gMemList'); list.innerHTML = '';
            g.members.forEach(m => {
                let r = g.roles[m] || "عضو";
                let kBtn = (canManage && m !== currentUser.username && r !== "الرئيس") ? `<button class="btn-sm" style="background:#ff3333" onclick="kick('${m}')">طرد</button>` : '';
                list.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; background:#000; padding:5px; border-radius:5px;"><span>${dbU[m]?.displayName || m} (${r})</span> ${kBtn}</div>`;
            });
            openM('gSetM');
        }

        function renameG() {
            let n = document.getElementById('editGName').value.trim();
            if(n) { 
                dbG[activeChatId].name = n; 
                localStorage.setItem('n_groups_db', JSON.stringify(dbG)); 
                renderList(); 
                closeM('gSetM'); 
            }
        }

        function kick(u) {
            let g = dbG[activeChatId];
            g.members = g.members.filter(m => m !== u);
            delete g.roles[u];
            localStorage.setItem('n_groups_db', JSON.stringify(dbG));
            openGSet(); renderMsgs();
        }

        function delG() {
            delete dbG[activeChatId];
            localStorage.setItem('n_groups_db', JSON.stringify(dbG));
            closeM('gSetM'); activeChatId = null; renderList();
        }

        function saveP() {
            currentUser.displayName = document.getElementById('pNameInp').value.trim() || currentUser.username;
            dbU[currentUser.username] = currentUser;
            localStorage.setItem('n_users_db', JSON.stringify(dbU));
            updateUI(); closeM('pM');
        }

        function logout() { 
            localStorage.removeItem('n_sess_token'); 
            location.reload(); 
        }

        function openM(id) { document.getElementById(id).classList.add('show'); }
        function closeM(id) { document.getElementById(id).classList.remove('show'); }

        /* خوارزمية تدرج الألوان */
        function hexToRgb(h) { 
            let b = parseInt(h.replace('#',''),16); 
            return {r:(b>>16)&255, g:(b>>8)&255, b:b&255}; 
        }

        function interpolate(c1,c2,f) {
            let a = hexToRgb(c1), b = hexToRgb(c2);
            return Math.round(a.r+f*(b.r-a.r)).toString(16).padStart(2,'0')+Math.round(a.g+f*(b.g-a.g)).toString(16).padStart(2,'0')+Math.round(a.b+f*(b.b-a.b)).toString(16).padStart(2,'0');
        }

        function genColors() {
            let t = document.getElementById('uInput').value, c1 = document.getElementById('c1').value, c2 = document.getElementById('c2').value, c3 = document.getElementById('c3').value;
            let html = '', code = '', len = t.length;
            for(let i=0; i<len; i++) {
                if(t[i] === ' ') { html += ' '; code += ' '; continue; }
                let f = len > 1 ? i/(len-1) : 0;
                let col = f <= 0.5 ? interpolate(c1,c2,f*2) : interpolate(c2,c3,(f-0.5)*2);
                code += `<c${col}>${t[i]}</c>`; html += `<span style="color:#${col}">${t[i]}</span>`;
            }
            document.getElementById('pOut').innerHTML = html || '...'; 
            document.getElementById('cOut').innerText = code;
        }

        function copyC() { 
            navigator.clipboard.writeText(document.getElementById('cOut').innerText); 
            alert("تم نسخ كود الألوان بنجاح!");
        }

        document.getElementById('uInput').oninput = genColors;
        document.getElementById('c1').oninput = genColors;
        document.getElementById('c2').oninput = genColors;
        document.getElementById('c3').oninput = genColors;
    </script>
</body>
</html>
