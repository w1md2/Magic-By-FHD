<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nulls Magic - AI Text Colorizer</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #16181d;
            --accent-blue: #0088ff;
            --neon-glow: rgba(0, 136, 255, 0.6);
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            text-align: center;
        }

        .header-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, #0088ff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 136, 255, 0.3);
        }

        .ai-btn {
            background: linear-gradient(135deg, #0088ff, #8a2be2);
            color: #fff;
            border: 1px solid rgba(0, 136, 255, 0.5);
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 136, 255, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .ai-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 22px rgba(0, 136, 255, 0.8);
        }

        /* الشريط الأسود ذو الحواف الزرقاء الماعة والضوء */
        .input-box {
            position: relative;
            background-color: #000000;
            border: 2px solid var(--accent-blue);
            border-radius: 12px;
            padding: 8px 15px;
            box-shadow: 0 0 15px var(--neon-glow), inset 0 0 10px rgba(0, 136, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .input-box:focus-within {
            box-shadow: 0 0 25px var(--accent-blue), inset 0 0 15px rgba(0, 136, 255, 0.4);
        }

        .input-box input[type="text"] {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1.1rem;
            padding: 10px;
        }

        /* 3 دوائر الألوان */
        .color-pickers {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .color-pickers input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        .color-pickers input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-pickers input[type="color"]::-webkit-color-swatch {
            border: 2px solid #fff;
            border-radius: 50%;
        }

        /* منطقة المعاينة والنتيجة */
        .result-card {
            background-color: var(--card-bg);
            border: 1px solid #282c34;
            border-radius: 12px;
            padding: 20px;
            text-align: right;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .preview-title {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }

        .text-preview {
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 40px;
            word-break: break-all;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #0d0e12;
            border-radius: 8px;
        }

        .code-output-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px 12px;
        }

        .code-output {
            font-family: monospace;
            color: #00ff88;
            font-size: 0.95rem;
            direction: ltr;
            overflow-x: auto;
            white-space: nowrap;
            width: 80%;
        }

        .copy-btn {
            background-color: var(--accent-blue);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background-color: #0066cc;
        }

        /* نافذة Null's AI Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--accent-blue);
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            height: 560px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 25px var(--neon-glow);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2e39;
            padding-bottom: 12px;
            margin-bottom: 12px;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            background: linear-gradient(45deg, #0088ff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 5px;
            margin-bottom: 12px;
        }

        .chat-msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
            white-space: pre-line;
        }

        .msg-ai {
            align-self: flex-start;
            background: #20242e;
            color: #fff;
            border-bottom-right-radius: 2px;
            border: 1px solid #323846;
        }

        .msg-user {
            align-self: flex-end;
            background: var(--accent-blue);
            color: #fff;
            border-bottom-left-radius: 2px;
        }

        .image-preview-area {
            display: none;
            align-items: center;
            gap: 10px;
            background: #000;
            padding: 5px 10px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .image-preview-area img {
            width: 35px;
            height: 35px;
            object-fit: cover;
            border-radius: 4px;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 6px;
            align-items: center;
        }

        .chat-input-area input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            padding: 8px;
        }

        .upload-btn {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        .send-btn {
            background: var(--accent-blue);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-area">
            <h1>Nulls Magic</h1>
            <button class="ai-btn" onclick="openAiModal()">🤖 Null’s AI</button>
        </div>

        <!-- الشريط الأسود المضيء -->
        <div class="input-box">
            <input type="text" id="userInput" placeholder="اكتب النص هنا..." value="Nulls Magic">
            
            <div class="color-pickers">
                <input type="color" id="color1" value="#0088ff" title="اللون الأول">
                <input type="color" id="color2" value="#8a2be2" title="اللون الثاني">
                <input type="color" id="color3" value="#ff007f" title="اللون الثالث">
            </div>
        </div>

        <!-- المعاينة وأكواد نولز -->
        <div class="result-card">
            <div class="preview-title">الشكل داخل اللعبة:</div>
            <div class="text-preview" id="textPreview"></div>

            <div class="preview-title">الكود المنسوخ (Nulls Colors):</div>
            <div class="code-output-container">
                <div class="code-output" id="codeOutput"></div>
                <button class="copy-btn" onclick="copyCode()">نسخ الكود</button>
            </div>
        </div>
    </div>

    <!-- نافذة Null's AI المباشرة بدون API -->
    <div class="modal" id="aiModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🤖 Null’s AI Assistant</h2>
                <button class="close-btn" onclick="closeAiModal()">&times;</button>
            </div>

            <div class="chat-box" id="chatBox">
                <div class="chat-msg msg-ai">
                    أهلاً بك! أنا Null’s AI 🤖.
سولف معي عن أي شيء، أو ارفع لي صورة عبر زر الكاميرا 📷 لأستخرج لك ألوانها، أو اطلب مني ألواناً محددة لتطبيقها فوراً!
                </div>
            </div>

            <div class="image-preview-area" id="imgPreviewArea">
                <img id="imgPreview" src="" alt="preview">
                <span style="font-size:0.8rem; color:#aaa;">تم اختيار صورة</span>
                <button style="background:none; border:none; color:red; cursor:pointer; margin-right:auto;" onclick="removeImage()">✕</button>
            </div>

            <div class="chat-input-area">
                <label class="upload-btn" title="رفع صورة">
                    📷
                    <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="handleImageSelect(event)">
                </label>
                <input type="text" id="aiMsgInput" placeholder="تحدث معي أو أرفق صورة..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendAiMessage()">إرسال</button>
            </div>
        </div>
    </div>

    <script>
        const userInput = document.getElementById('userInput');
        const color1Input = document.getElementById('color1');
        const color2Input = document.getElementById('color2');
        const color3Input = document.getElementById('color3');
        const textPreview = document.getElementById('textPreview');
        const codeOutput = document.getElementById('codeOutput');
        const chatBox = document.getElementById('chatBox');
        const aiMsgInput = document.getElementById('aiMsgInput');

        let selectedImageElement = null;

        function hexToRgb(hex) {
            const bigint = parseInt(hex.replace('#', ''), 16);
            return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
        }

        function interpolateColor(c1Hex, c2Hex, factor) {
            const c1 = hexToRgb(c1Hex);
            const c2 = hexToRgb(c2Hex);
            const r = Math.round(c1.r + factor * (c2.r - c1.r)).toString(16).padStart(2, '0');
            const g = Math.round(c1.g + factor * (c2.g - c1.g)).toString(16).padStart(2, '0');
            const b = Math.round(c1.b + factor * (c2.b - c1.b)).toString(16).padStart(2, '0');
            return `${r}${g}${b}`;
        }

        function get3PointGradientColor(factor) {
            if (factor <= 0.5) {
                return interpolateColor(color1Input.value, color2Input.value, factor * 2);
            } else {
                return interpolateColor(color2Input.value, color3Input.value, (factor - 0.5) * 2);
            }
        }

        function generateGradientText() {
            const text = userInput.value;
            if (!text) {
                textPreview.innerHTML = '';
                codeOutput.innerText = '';
                return;
            }

            let previewHTML = '';
            let generatedCode = '';
            const len = text.length;

            for (let i = 0; i < len; i++) {
                const char = text[i];
                if (char === ' ') {
                    previewHTML += ' ';
                    generatedCode += ' ';
                    continue;
                }

                const factor = len > 1 ? i / (len - 1) : 0;
                const hexColor = get3PointGradientColor(factor);

                generatedCode += `<c${hexColor}>${char}</c>`;
                previewHTML += `<span style="color: #${hexColor}">${char}</span>`;
            }

            textPreview.innerHTML = previewHTML;
            codeOutput.innerText = generatedCode;
        }

        function copyCode() {
            const code = codeOutput.innerText;
            if (!code) return;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.innerText = 'تم النسخ!';
                btn.style.backgroundColor = '#00cc66';
                setTimeout(() => {
                    btn.innerText = 'نسخ الكود';
                    btn.style.backgroundColor = 'var(--accent-blue)';
                }, 1500);
            });
        }

        function openAiModal() { document.getElementById('aiModal').style.display = 'flex'; }
        function closeAiModal() { document.getElementById('aiModal').style.display = 'none'; }
        function handleKeyPress(e) { if (e.key === 'Enter') sendAiMessage(); }

        function handleImageSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                const img = new Image();
                img.src = evt.target.result;
                img.onload = function() {
                    selectedImageElement = img;
                    document.getElementById('imgPreview').src = evt.target.result;
                    document.getElementById('imgPreviewArea').style.display = 'flex';
                }
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            selectedImageElement = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('imgPreviewArea').style.display = 'none';
        }

        function extractColorsFromImage(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            // سحب 3 بكسلات من نقاط مختلفة وموزعة بالصورة
            const p1 = ctx.getImageData(Math.floor(img.width * 0.2), Math.floor(img.height * 0.2), 1, 1).data;
            const p2 = ctx.getImageData(Math.floor(img.width * 0.5), Math.floor(img.height * 0.5), 1, 1).data;
            const p3 = ctx.getImageData(Math.floor(img.width * 0.8), Math.floor(img.height * 0.8), 1, 1).data;

            const rgbToHex = (r, g, b) => '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');

            return [
                rgbToHex(p1[0], p1[1], p1[2]),
                rgbToHex(p2[0], p2[1], p2[2]),
                rgbToHex(p3[0], p3[1], p3[2])
            ];
        }

        function sendAiMessage() {
            const text = aiMsgInput.value.trim();
            if (!text && !selectedImageElement) return;

            let userDisplay = text;
            if (selectedImageElement && !text) userDisplay = "[تم إرفاق صورة]";
            appendMessage(userDisplay, 'user');

            const hasImage = !!selectedImageElement;
            const imgObj = selectedImageElement;

            aiMsgInput.value = '';
            removeImage();

            setTimeout(() => {
                if (hasImage) {
                    const colors = extractColorsFromImage(imgObj);
                    setColors(colors[0], colors[1], colors[2]);
                    appendMessage("قمت بتحليل ألوان الصورة بنجاح وتطبيقه على التدرج ودوائر الألوان الثلاثية! 🎨📸", 'ai');
                } else {
                    const response = processSmartAiBrain(text);
                    appendMessage(response, 'ai');
                }
            }, 400);
        }

        function appendMessage(msg, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('chat-msg', sender === 'user' ? 'msg-user' : 'msg-ai');
            msgDiv.innerText = msg;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        /* محرك ذكاء اصطناعي ذكي يعتمد على تحليل المقاصد (Intent Analysis) */
        function processSmartAiBrain(input) {
            const txt = input.trim().toLowerCase();

            // 1. التعرف على التحيات والأسئلة العامة (بدون تغيير الألوان)
            if (/^(كيف حالك|كيفك|شخبارك|اخبارك|شلونك)/.test(txt)) {
                return "الحمد لله تمام وبأفضل حال! يسعدني التحدث معك، كيف يمكنني مساعدتك اليوم؟ 😊";
            }
            if (/^(مرحبا|اهلين|أهلا|هلا|السلام عليكم|سلام)/.test(txt)) {
                return "وعليكم السلام وأهلاً بك يا بطل! نورت Null’s AI 🤖. كيف أقدر أخدمك؟";
            }
            if (/^(من انت|من أنت|عرف عن نفسك|وش تسوي)/.test(txt)) {
                return "أنا Null’s AI! مساعدك الذكي المخصص لتصميم واختيار ألوان نولز وتوليد تدرجات الألوان. أقدر أسولف معك، أحوّل أفكارك لألوان، أو أحلل صورك!";
            }
            if (/^(شكرا|مشكور|تسلم|يعطيك العافيه|يعطيك العافية)/.test(txt)) {
                return "العفو، حبيبي! في خدمتك دائماً في أي وقت 💙";
            }

            // 2. تحليل الكلمات المفتاحية للـ الألوان والثيمات (تغيير الألوان عند طلب المستخدم فقط)
            if (txt.includes('نار') || txt.includes('بركان') || txt.includes('ناري')) {
                setColors('#ff0000', '#ff6600', '#ffee00');
                return "تمت معالجة طلبك! جهزت لك تدرج ناري نيون ممتاز وربطته بالدوائر الثلاث فوراً 🔴🔥";
            }
            if (txt.includes('ثلج') || txt.includes('جليد') || txt.includes('ثلجي')) {
                setColors('#00f0ff', '#0077ff', '#ffffff');
                return "تم! قمت بإنشاء ثيم ثلجي كريستالي وتطبيقه على النص والدوائر ❄️💎";
            }
            if (txt.includes('سام') || txt.includes('سم') || txt.includes('لايم') || txt.includes('اخضر') || txt.includes('أخضر')) {
                setColors('#00ff44', '#a6ff00', '#003311');
                return "تم اختيار ثيم السُم والنيون الأخضر وتطبيقه بنجاح 🧪🟢";
            }
            if (txt.includes('بنفسجي') || txt.includes('ملكي') || txt.includes('شبح')) {
                setColors('#8a2be2', '#d800ff', '#240046');
                return "تم ضبط التدرج البنفسجي الملكي الفخم 🟣✨";
            }
            if (txt.includes('ذهب') || txt.includes('ذهبي') || txt.includes('فخم')) {
                setColors('#ffe600', '#ffaa00', '#774400');
                return "تم تطبيق التدرج الذهبي اللامع بنجاح 👑💛";
            }
            if (txt.includes('ورد') || txt.includes('وردي') || txt.includes('بناتي') || txt.includes('كيوت')) {
                setColors('#ff007f', '#ff66cc', '#ffffff');
                return "تم اختيار وتطبيق التدرج الوردي الناعم ✨ كيوووت!";
            }
            if (txt.includes('ليل') || txt.includes('فضاء') || txt.includes('كواكب') || txt.includes('مظلم')) {
                setColors('#000b1e', '#1a0033', '#0088ff');
                return "تم تطبيق ثيم الفضاء والليل المظلم العميق 🌌";
            }

            // 3. إذا كان طلب لون مخصص أو فكرة غير متوقعة
            if (txt.includes('لون') || txt.includes('ألوان') || txt.includes('الوان') || txt.includes('ثيم') || txt.includes('تدرج')) {
                const c1 = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                const c2 = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                const c3 = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                setColors(c1, c2, c3);
                return `فهمت طلبك بخصوص الألوان! قمت بتحليل فكرتك واختيار 3 ألوان متناسقة وتطبيقها لك مباشرة 🎨✨`;
            }

            // 4. الرد الذكي المفتوح للأسئلة العادية العشوائية
            return `فهمت كلامك! أنا هنا للدردشة معك ومساعدتك في أي وقت، وإذا احتجت أي ثيم ألوان أو تحليلات لـ نولز فقط اطلب مني أو أرفق صورة! 😊`;
        }

        function setColors(c1, c2, c3) {
            color1Input.value = c1;
            color2Input.value = c2;
            color3Input.value = c3;
            generateGradientText();
        }

        userInput.addEventListener('input', generateGradientText);
        color1Input.addEventListener('input', generateGradientText);
        color2Input.addEventListener('input', generateGradientText);
        color3Input.addEventListener('input', generateGradientText);

        generateGradientText();
    </script>
</body>
</html>
