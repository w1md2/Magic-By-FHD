<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Null's Magic V2 - Full System</title>
    <style>
        /* ==========================================
           1. Basic CSS Variables and Reset
           ========================================== */
        :root {
            --primary-bg: #0d0e12;
            --card-bg: #16181d;
            --accent-blue: #0088ff;
            --accent-purple: #8a2be2;
            --accent-pink: #ff007f;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: rgba(0, 136, 255, 0.3);
            --danger-color: #ff3333;
            --success-color: #00ff88;
            --warning-color: #ffcc00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* ==========================================
           2. Navigation Header
           ========================================== */
        .navbar {
            width: 100%;
            background: #111318;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .nav-btn {
            padding: 10px 20px;
            border-radius: 25px;
            background: #1a1d24;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: bold;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            color: var(--text-main);
            border-color: var(--accent-blue);
        }

        .nav-btn.active {
            background: var(--accent-blue);
            color: #ffffff;
            box-shadow: 0 0 10px rgba(0, 136, 255, 0.5);
        }

        /* ==========================================
           3. Profile Widget
           ========================================== */
        .profile-widget {
            position: absolute;
            top: 10px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 12px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
        }

        .profile-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--accent-blue);
            object-fit: cover;
            background: #222;
        }

        .profile-name {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--text-main);
        }

        /* ==========================================
           4. Layout Container Sections
           ========================================== */
        .main-container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease-in-out;
        }

        .section.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==========================================
           5. Color Generator Section
           ========================================== */
        .section-title {
            font-size: 2.2rem;
            color: var(--accent-blue);
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 136, 255, 0.3);
        }

        .tool-card {
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .input-group {
            width: 100%;
            background: #000;
            border: 2px solid var(--accent-blue);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1.1rem;
        }

        .color-pickers {
            display: flex;
            gap: 6px;
        }

        .color-pickers input[type="color"] {
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        .preview-box {
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 50px;
            background: #0d0e12;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #333;
        }

        .code-box {
            display: flex;
            justify-content: space-between;
            background: #000;
            border-radius: 8px;
            padding: 10px;
            align-items: center;
            border: 1px solid #222;
        }

        .code-output {
            font-family: 'Courier New', Courier, monospace;
            color: var(--success-color);
            direction: ltr;
            overflow-x: auto;
            width: 80%;
            white-space: nowrap;
        }

        .action-btn {
            background: var(--accent-blue);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #0066cc;
        }

        /* ==========================================
           6. Chat App Layout & Styles
           ========================================== */
        .chat-app {
            width: 100%;
            height: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .chat-sidebar {
            width: 32%;
            background: #111318;
            border-left: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 12px;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d0e12;
        }

        .add-friend-box {
            display: flex;
            gap: 5px;
            margin-bottom: 12px;
        }

        .add-friend-box input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
        }

        .btn-small {
            background: var(--accent-blue);
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            white-space: nowrap;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .list-item {
            padding: 10px;
            background: #1a1d24;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .list-item:hover {
            background: #252a34;
        }

        .list-item.active {
            background: var(--accent-blue);
        }

        .list-item img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        .chat-header {
            padding: 15px;
            background: #16181d;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1rem;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .message-wrapper.mine {
            align-self: flex-start;
        }

        .message-wrapper.other {
            align-self: flex-end;
        }

        .message-header {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            cursor: pointer;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .message-header img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .role-badge {
            background: #333;
            color: var(--warning-color);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: bold;
        }

        .message-body {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.95rem;
            background: #222630;
            word-break: break-word;
            line-height: 1.4;
        }

        .message-wrapper.mine .message-body {
            background: var(--accent-blue);
        }

        .message-body img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 6px;
        }

        .chat-input-area {
            display: flex;
            padding: 12px;
            background: #16181d;
            gap: 8px;
            align-items: center;
            border-top: 1px solid #222;
        }

        .chat-input-area input[type="text"] {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }

        /* ==========================================
           7. Modals & Overlay Windows
           ========================================== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-card {
            background: var(--card-bg);
            border: 1px solid var(--accent-blue);
            border-radius: 15px;
            padding: 25px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 136, 255, 0.2);
        }

        .modal-close {
            position: absolute;
            top: 12px;
            left: 18px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.8rem;
            cursor: pointer;
        }

        .form-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--accent-blue);
            padding: 10px;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 12px;
            outline: none;
        }

        .btn-full {
            background: var(--accent-blue);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 20px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 8px;
        }

        .btn-orange {
            background: #ff9900;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 20px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-danger {
            background: var(--danger-color);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 20px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Helper Classes */
        .text-center { text-align: center; }
        .mt-10 { margin-top: 10px; }
        .mb-10 { margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <div class="navbar">
        <button class="nav-btn active" onclick="switchTab('colors-tab', this)">Null’s Magic 🎨</button>
        <button class="nav-btn" onclick="switchTab('chat-tab', this)">الرسائل 💬</button>
    </div>

    <!-- User Profile Top Right -->
    <div class="profile-widget" onclick="openProfileModal(currentUser.username)">
        <img id="headAvatar" class="profile-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=Nulls" alt="Avatar">
        <span id="headName" class="profile-name">زائر</span>
    </div>

    <div class="main-container">

        <!-- ==========================================
             Section 1: Gradient Generator
             ========================================== -->
        <div id="colors-tab" class="section active">
            <h1 class="section-title">Nulls Magic V2</h1>
            
            <div class="tool-card">
                <div class="input-group">
                    <input type="text" id="userInputText" placeholder="اكتب النص هنا..." value="Nulls Magic">
                    <div class="color-pickers">
                        <input type="color" id="colorPicker1" value="#0088ff">
                        <input type="color" id="colorPicker2" value="#8a2be2">
                        <input type="color" id="colorPicker3" value="#ff007f">
                    </div>
                </div>

                <div class="preview-box" id="previewOutput"></div>

                <div class="code-box">
                    <div class="code-output" id="codeOutputText"></div>
                    <button class="action-btn" onclick="copyGeneratedCode()">نسخ الكود</button>
                </div>
            </div>
        </div>

        <!-- ==========================================
             Section 2: Multi-Chat System
             ========================================== -->
        <div id="chat-tab" class="section">
            <div class="chat-app">
                <!-- Chat Sidebar -->
                <div class="chat-sidebar">
                    <div class="add-friend-box">
                        <input type="text" id="friendInputName" placeholder="اسم اليوزر...">
                        <button class="btn-small" onclick="addNewFriend()">إضافة</button>
                    </div>
                    <button class="btn-small" style="background:#8a2be2; margin-bottom:10px;" onclick="openModal('groupCreateModal')">➕ إنشاء قروب</button>
                    <div class="list-container" id="chatFriendsList"></div>
                </div>

                <!-- Chat Main Window -->
                <div class="chat-main">
                    <div class="chat-header">
                        <span id="chatHeaderTitle">اختر محادثة</span>
                        <button id="groupManageBtn" class="btn-small" style="display:none;" onclick="openGroupSettings()">إدارة القروب ⚙️</button>
                    </div>
                    
                    <div class="chat-messages" id="chatMessageDisplay"></div>
                    
                    <div class="chat-input-area">
                        <label style="cursor:pointer;" title="إرفاق صورة">
                            📷
                            <input type="file" id="imageFileInput" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
                        </label>
                        <input type="text" id="chatMessageInput" placeholder="اكتب رسالتك..." onkeypress="handleKeyPress(event)">
                        <button class="btn-small" onclick="dispatchMessage()">إرسال</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- ==========================================
         Modals Configuration
         ========================================== -->

    <!-- Authentication Modal -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-card">
            <h3 style="color:var(--accent-blue); margin-bottom:15px;">تسجيل الدخول / حساب جديد</h3>
            <div id="authErrorMessage" style="color:red; font-size:0.85rem; display:none; margin-bottom:100px;"></div>
            <input type="text" id="authDisplayName" class="form-input" placeholder="الاسم الظاهر">
            <input type="text" id="authUsername" class="form-input" placeholder="اسم المستخدم (إنجليزي)">
            <input type="password" id="authPassword" class="form-input" placeholder="كلمة السر">
            <button class="btn-full" onclick="handleAuthSubmit()">دخول</button>
        </div>
    </div>

    <!-- Create Group Modal -->
    <div class="modal-overlay" id="groupCreateModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal('groupCreateModal')">&times;</button>
            <h3>إنشاء مجموعة جديدة</h3>
            <input type="text" id="newGroupName" class="form-input" placeholder="اسم القروب..." style="margin-top:15px;">
            <div id="groupFriendChecklist" style="text-align:right; max-height:140px; overflow-y:auto; margin-bottom:10px;"></div>
            <button class="btn-full" onclick="createNewGroup()">إنشاء الآن</button>
        </div>
    </div>

    <!-- Manage Group Modal -->
    <div class="modal-overlay" id="groupSettingsModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal('groupSettingsModal')">&times;</button>
            <h3>إدارة القروب</h3>
            <input type="text" id="groupNameEditInput" class="form-input" placeholder="اسم القروب الجديد" style="margin-top:15px;">
            <button class="btn-full" id="renameGroupBtn" onclick="updateGroupName()">تعديل الاسم</button>
            <div id="groupMemberListContainer" style="text-align:right; margin:15px 0; max-height:160px; overflow-y:auto;"></div>
            <button class="btn-danger" id="deleteGroupBtn" style="display:none;" onclick="removeGroup()">حذف القروب 🗑️</button>
        </div>
    </div>

    <!-- Profile & Promotion Modal -->
    <div class="modal-overlay" id="profileViewModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal('profileViewModal')">&times;</button>
            <h3 id="profileModalTitle">الملف الشخصي</h3>
            <img id="profileModalImage" style="width:80px; height:80px; border-radius:50%; margin:15px 0; border:2px solid var(--accent-blue);" src="">
            <input type="text" id="profileNameEditInput" class="form-input" placeholder="الاسم الظاهر">
            <button class="btn-full" id="saveProfileBtn" onclick="saveProfileChanges()">حفظ التغيرات</button>
            <button class="btn-orange" id="promoteUserBtn" style="display:none;" onclick="promoteSelectedMember()">ترقية الرتبة ⬆️</button>
            <button class="btn-danger" id="logoutBtn" onclick="triggerLogout()">تسجيل الخروج</button>
        </div>
    </div>

    <!-- ==========================================
         JavaScript Code Base
         ========================================== -->
    <script>
        /* ------------------------------------------
           Global Application State Variables
           ------------------------------------------ */
        let currentUser = null;
        let activeChatId = null;
        let activeChatType = 'self';
        let selectedTargetUsername = null;

        /* Local Storage Database Keys */
        let usersDatabase = JSON.parse(localStorage.getItem('n_users_db') || '{}');
        let groupsDatabase = JSON.parse(localStorage.getItem('n_groups_db') || '{}');
        let chatsDatabase = JSON.parse(localStorage.getItem('n_chats_db') || '{}');

        /* ------------------------------------------
           Initialization & Session Handlers
           ------------------------------------------ */
        window.addEventListener('DOMContentLoaded', () => {
            initializeApplicationSession();
            bindColorGeneratorEvents();
            generateGradientText();
        });

        function initializeApplicationSession() {
            let activeSessionToken = localStorage.getItem('n_active_session');
            if (activeSessionToken && usersDatabase[activeSessionToken]) {
                currentUser = usersDatabase[activeSessionToken];
                refreshUserProfileHeader();
            } else {
                openModal('authModal');
            }
        }

        function refreshUserProfileHeader() {
            document.getElementById('headName').innerText = currentUser.displayName;
            document.getElementById('headAvatar').src = currentUser.avatar;
            renderChatSidebarList();
        }

        /* ------------------------------------------
           Tab Switching Logic
           ------------------------------------------ */
        function switchTab(targetTabId, triggerButton) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(targetTabId).classList.add('active');
            triggerButton.classList.add('active');
        }

        /* ------------------------------------------
           User Authentication Handlers
           ------------------------------------------ */
        function handleAuthSubmit() {
            let usernameInput = document.getElementById('authUsername').value.trim();
            let passwordInput = document.getElementById('authPassword').value.trim();
            let displayNameInput = document.getElementById('authDisplayName').value.trim();

            if (!usernameInput || !passwordInput) {
                showAuthError("يرجى ملء جميع الحقول المطلوبة!");
                return;
            }

            if (usersDatabase[usernameInput]) {
                if (usersDatabase[usernameInput].password === passwordInput) {
                    currentUser = usersDatabase[usernameInput];
                } else {
                    showAuthError("كلمة المرور غير صحيحة!");
                    return;
                }
            } else {
                currentUser = {
                    username: usernameInput,
                    displayName: displayNameInput || usernameInput,
                    password: passwordInput,
                    avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=" + usernameInput,
                    friends: [],
                    groups: []
                };
                usersDatabase[usernameInput] = currentUser;
                saveUsersToStorage();
            }

            localStorage.setItem('n_active_session', usernameInput);
            refreshUserProfileHeader();
            closeModal('authModal');
        }

        function showAuthError(messageText) {
            let errorContainer = document.getElementById('authErrorMessage');
            errorContainer.innerText = messageText;
            errorContainer.style.display = 'block';
        }

        function triggerLogout() {
            localStorage.removeItem('n_active_session');
            window.location.reload();
        }

        /* ------------------------------------------
           Chat & Friends Sidebar Management
           ------------------------------------------ */
        function addNewFriend() {
            let targetFriendUsername = document.getElementById('friendInputName').value.trim();
            if (!targetFriendUsername || !usersDatabase[targetFriendUsername] || targetFriendUsername === currentUser.username) {
                return;
            }

            if (!currentUser.friends.includes(targetFriendUsername)) {
                currentUser.friends.push(targetFriendUsername);
                usersDatabase[currentUser.username] = currentUser;
                saveUsersToStorage();
            }

            document.getElementById('friendInputName').value = '';
            renderChatSidebarList();
        }

        function renderChatSidebarList() {
            let sidebarContainer = document.getElementById('chatFriendsList');
            let groupChecklistContainer = document.getElementById('groupFriendChecklist');
            
            sidebarContainer.innerHTML = '';
            groupChecklistContainer.innerHTML = '';

            /* Personal Chat Self Option */
            let selfChatItem = document.createElement('div');
            selfChatItem.className = 'list-item' + (activeChatId === 'self' ? ' active' : '');
            selfChatItem.innerHTML = `<span>👤 رسائلي الخاصة (نفسي)</span>`;
            selfChatItem.onclick = () => selectActiveChat('self', 'self');
            sidebarContainer.appendChild(selfChatItem);

            /* Group Items */
            currentUser.groups?.forEach(groupId => {
                if (groupsDatabase[groupId]) {
                    let groupItem = document.createElement('div');
                    groupItem.className = 'list-item' + (activeChatId === groupId ? ' active' : '');
                    groupItem.innerHTML = `👥 <span>${groupsDatabase[groupId].name}</span>`;
                    groupItem.onclick = () => selectActiveChat(groupId, 'group');
                    sidebarContainer.appendChild(groupItem);
                }
            });

            /* Friends Items */
            currentUser.friends?.forEach(friendUsername => {
                if (usersDatabase[friendUsername]) {
                    let friendItem = document.createElement('div');
                    friendItem.className = 'list-item' + (activeChatId === friendUsername ? ' active' : '');
                    friendItem.innerHTML = `<img src="${usersDatabase[friendUsername].avatar}"> <span>${usersDatabase[friendUsername].displayName}</span>`;
                    friendItem.onclick = () => selectActiveChat(friendUsername, 'friend');
                    sidebarContainer.appendChild(friendItem);

                    groupChecklistContainer.innerHTML += `
                        <label style="display:block; margin-bottom:5px;">
                            <input type="checkbox" value="${friendUsername}"> ${usersDatabase[friendUsername].displayName}
                        </label>`;
                }
            });
        }

        /* ------------------------------------------
           Group Creation & Role Systems
           ------------------------------------------ */
        function createNewGroup() {
            let groupTitleInput = document.getElementById('newGroupName').value.trim();
            if (!groupTitleInput) return;

            let selectedFriendCheckboxes = Array.from(document.querySelectorAll('#groupFriendChecklist input:checked')).map(c => c.value);
            selectedFriendCheckboxes.push(currentUser.username);

            let newGroupId = 'group_' + Date.now();
            let memberRolesMap = {};
            memberRolesMap[currentUser.username] = "الرئيس";

            groupsDatabase[newGroupId] = {
                id: newGroupId,
                name: groupTitleInput,
                owner: currentUser.username,
                members: selectedFriendCheckboxes,
                roles: memberRolesMap
            };

            selectedFriendCheckboxes.forEach(username => {
                if (usersDatabase[username]) {
                    usersDatabase[username].groups = usersDatabase[username].groups || [];
                    usersDatabase[username].groups.push(newGroupId);
                }
            });

            saveGroupsToStorage();
            saveUsersToStorage();
            closeModal('groupCreateModal');
            renderChatSidebarList();
        }

        function selectActiveChat(chatIdentifier, chatType) {
            activeChatId = chatIdentifier;
            activeChatType = chatType;
            
            renderChatSidebarList();

            let manageGroupBtn = document.getElementById('groupManageBtn');
            let headerTitleSpan = document.getElementById('chatHeaderTitle');

            if (chatType === 'group') {
                manageGroupBtn.style.display = 'block';
                headerTitleSpan.innerText = groupsDatabase[chatIdentifier]?.name || "مجموعة";
            } else if (chatType === 'friend') {
                manageGroupBtn.style.display = 'none';
                headerTitleSpan.innerText = usersDatabase[chatIdentifier]?.displayName || "محادثة";
            } else {
                manageGroupBtn.style.display = 'none';
                headerTitleSpan.innerText = "الملاحظات الشخصية";
            }

            renderChatMessages();
        }

        /* ------------------------------------------
           Chat Messaging Logic
           ------------------------------------------ */
        function getStorageChatKey() {
            if (activeChatType === 'self') return 'chat_self_' + currentUser.username;
            if (activeChatType === 'group') return activeChatId;
            return [currentUser.username, activeChatId].sort().join('_chat_');
        }

        function dispatchMessage(imageUrl = null) {
            let messageTextInput = document.getElementById('chatMessageInput');
            let messageContent = messageTextInput.value.trim();

            if (!messageContent && !imageUrl) return;

            let storageKey = getStorageChatKey();
            if (!storageKey) return;

            chatsDatabase[storageKey] = chatsDatabase[storageKey] || [];
            
            let newMessageObject = {
                sender: currentUser.username,
                name: currentUser.displayName,
                avatar: currentUser.avatar,
                text: messageContent,
                img: imageUrl,
                timestamp: Date.now()
            };

            chatsDatabase[storageKey].push(newMessageObject);
            messageTextInput.value = '';

            /* Auto Sync for Self Chat */
            if (activeChatType === 'self') {
                setTimeout(() => {
                    saveChatsToStorage();
                    renderChatMessages();
                }, 100);
            }

            saveChatsToStorage();
            renderChatMessages();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                dispatchMessage();
            }
        }

        function handleImageUpload(event) {
            let selectedFile = event.target.files[0];
            if (selectedFile) {
                let fileReader = new FileReader();
                fileReader.onload = (fileEvent) => {
                    dispatchMessage(fileEvent.target.result);
                };
                fileReader.readAsDataURL(selectedFile);
            }
        }

        function renderChatMessages() {
            let messagesDisplayBox = document.getElementById('chatMessageDisplay');
            messagesDisplayBox.innerHTML = '';

            let storageKey = getStorageChatKey();
            if (!storageKey || !chatsDatabase[storageKey]) return;

            let currentGroupContext = (activeChatType === 'group') ? groupsDatabase[activeChatId] : null;

            chatsDatabase[storageKey].forEach(msg => {
                let isUserOwnerOfMessage = (msg.sender === currentUser.username);
                
                let wrapperDiv = document.createElement('div');
                wrapperDiv.className = 'message-wrapper ' + (isUserOwnerOfMessage ? 'mine' : 'other');

                let headerDiv = document.createElement('div');
                headerDiv.className = 'message-header';
                headerDiv.onclick = () => openProfileModal(msg.sender);

                let userGroupRoleBadge = (currentGroupContext && currentGroupContext.roles && currentGroupContext.roles[msg.sender])
                    ? `<span class="role-badge">${currentGroupContext.roles[msg.sender]}</span>`
                    : '';

                headerDiv.innerHTML = `<img src="${msg.avatar}"> <span>${msg.name}</span> ${userGroupRoleBadge}`;

                let bodyDiv = document.createElement('div');
                bodyDiv.className = 'message-body';
                
                if (msg.text) bodyDiv.innerText = msg.text;
                if (msg.img) bodyDiv.innerHTML += `<br><img src="${msg.img}">`;

                wrapperDiv.appendChild(headerDiv);
                wrapperDiv.appendChild(bodyDiv);
                messagesDisplayBox.appendChild(wrapperDiv);
            });

            messagesDisplayBox.scrollTop = messagesDisplayBox.scrollHeight;
        }

        /* ------------------------------------------
           Profile and Modal Management Logic
           ------------------------------------------ */
        function openProfileModal(targetUsername) {
            selectedTargetUsername = targetUsername;
            let isOwnProfile = (targetUsername === currentUser.username);
            let profileData = usersDatabase[targetUsername] || { displayName: currentUser.displayName, avatar: currentUser.avatar };

            document.getElementById('profileModalTitle').innerText = isOwnProfile ? "الملف الشخصي" : "معاينة الملف";
            document.getElementById('profileModalImage').src = profileData.avatar;
            document.getElementById('profileNameEditInput').value = profileData.displayName;
            document.getElementById('profileNameEditInput').disabled = !isOwnProfile;
            
            document.getElementById('saveProfileBtn').style.display = isOwnProfile ? 'block' : 'none';
            document.getElementById('logoutBtn').style.display = isOwnProfile ? 'block' : 'none';

            let promoteBtn = document.getElementById('promoteUserBtn');
            if (activeChatType === 'group' && groupsDatabase[activeChatId] && !isOwnProfile) {
                let currentUserRole = groupsDatabase[activeChatId].roles[currentUser.username] || "عضو";
                promoteBtn.style.display = (currentUserRole === "الرئيس") ? 'block' : 'none';
            } else {
                promoteBtn.style.display = 'none';
            }

            openModal('profileViewModal');
        }

        function saveProfileChanges() {
            let updatedName = document.getElementById('profileNameEditInput').value.trim();
            if (updatedName) {
                currentUser.displayName = updatedName;
                usersDatabase[currentUser.username] = currentUser;
                saveUsersToStorage();
                refreshUserProfileHeader();
                closeModal('profileViewModal');
            }
        }

        function promoteSelectedMember() {
            if (!activeChatId || activeChatType !== 'group' || !selectedTargetUsername) return;

            let group = groupsDatabase[activeChatId];
            let currentMemberRole = group.roles[selectedTargetUsername] || "عضو";

            if (currentMemberRole === "عضو") {
                group.roles[selectedTargetUsername] = "وكيل";
            } else if (currentMemberRole === "وكيل") {
                group.roles[selectedTargetUsername] = "نائب";
            }

            saveGroupsToStorage();
            closeModal('profileViewModal');
            renderChatMessages();
        }

        function openGroupSettings() {
            let currentGroup = groupsDatabase[activeChatId];
            if (!currentGroup) return;

            document.getElementById('groupNameEditInput').value = currentGroup.name;
            let myRoleInGroup = currentGroup.roles[currentUser.username] || "عضو";
            let hasManagementRights = (myRoleInGroup === "الرئيس" || myRoleInGroup === "نائب");

            document.getElementById('renameGroupBtn').style.display = hasManagementRights ? 'block' : 'none';
            document.getElementById('deleteGroupBtn').style.display = (myRoleInGroup === "الرئيس") ? 'block' : 'none';

            let memberListContainer = document.getElementById('groupMemberListContainer');
            memberListContainer.innerHTML = '';

            currentGroup.members.forEach(memberUsername => {
                let memberRole = currentGroup.roles[memberUsername] || "عضو";
                let kickButtonHTML = (hasManagementRights && memberUsername !== currentUser.username && memberRole !== "الرئيس")
                    ? `<button class="btn-small" style="background:var(--danger-color)" onclick="kickMemberFromGroup('${memberUsername}')">طرد</button>`
                    : '';

                memberListContainer.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; background:#111; padding:6px; border-radius:6px;">
                        <span>${usersDatabase[memberUsername]?.displayName || memberUsername} (${memberRole})</span>
                        ${kickButtonHTML}
                    </div>`;
            });

            openModal('groupSettingsModal');
        }

        function updateGroupName() {
            let newTitle = document.getElementById('groupNameEditInput').value.trim();
            if (newTitle && groupsDatabase[activeChatId]) {
                groupsDatabase[activeChatId].name = newTitle;
                saveGroupsToStorage();
                renderChatSidebarList();
                closeModal('groupSettingsModal');
            }
        }

        function kickMemberFromGroup(memberUsername) {
            let group = groupsDatabase[activeChatId];
            if (group) {
                group.members = group.members.filter(m => m !== memberUsername);
                delete group.roles[memberUsername];
                saveGroupsToStorage();
                openGroupSettings();
                renderChatMessages();
            }
        }

        function removeGroup() {
            if (groupsDatabase[activeChatId]) {
                delete groupsDatabase[activeChatId];
                saveGroupsToStorage();
                closeModal('groupSettingsModal');
                activeChatId = null;
                renderChatSidebarList();
            }
        }

        /* ------------------------------------------
           Gradient Color Generator Core Algorithm
           ------------------------------------------ */
        function bindColorGeneratorEvents() {
            document.getElementById('userInputText').addEventListener('input', generateGradientText);
            document.getElementById('colorPicker1').addEventListener('input', generateGradientText);
            document.getElementById('colorPicker2').addEventListener('input', generateGradientText);
            document.getElementById('colorPicker3').addEventListener('input', generateGradientText);
        }

        function hexToRgbComponents(hexColor) {
            let parsedHex = parseInt(hexColor.replace('#', ''), 16);
            return {
                r: (parsedHex >> 16) & 255,
                g: (parsedHex >> 8) & 255,
                b: parsedHex & 255
            };
        }

        function interpolateHexColors(colorHex1, colorHex2, factorRatio) {
            let rgb1 = hexToRgbComponents(colorHex1);
            let rgb2 = hexToRgbComponents(colorHex2);

            let interpolatedRed = Math.round(rgb1.r + factorRatio * (rgb2.r - rgb1.r)).toString(16).padStart(2, '0');
            let interpolatedGreen = Math.round(rgb1.g + factorRatio * (rgb2.g - rgb1.g)).toString(16).padStart(2, '0');
            let interpolatedBlue = Math.round(rgb1.b + factorRatio * (rgb2.b - rgb1.b)).toString(16).padStart(2, '0');

            return interpolatedRed + interpolatedGreen + interpolatedBlue;
        }

        function generateGradientText() {
            let textInput = document.getElementById('userInputText').value;
            let hex1 = document.getElementById('colorPicker1').value;
            let hex2 = document.getElementById('colorPicker2').value;
            let hex3 = document.getElementById('colorPicker3').value;

            let formattedHtmlOutput = '';
            let rawCodeOutput = '';
            let stringLength = textInput.length;

            for (let i = 0; i < stringLength; i++) {
                if (textInput[i] === ' ') {
                    formattedHtmlOutput += ' ';
                    rawCodeOutput += ' ';
                    continue;
                }

                let progressionRatio = stringLength > 1 ? i / (stringLength - 1) : 0;
                let calculatedColorHex = '';

                if (progressionRatio <= 0.5) {
                    calculatedColorHex = interpolateHexColors(hex1, hex2, progressionRatio * 2);
                } else {
                    calculatedColorHex = interpolateHexColors(hex2, hex3, (progressionRatio - 0.5) * 2);
                }

                rawCodeOutput += `<c${calculatedColorHex}>${textInput[i]}</c>`;
                formattedHtmlOutput += `<span style="color:#${calculatedColorHex}">${textInput[i]}</span>`;
            }

            document.getElementById('previewOutput').innerHTML = formattedHtmlOutput || '...';
            document.getElementById('codeOutputText').innerText = rawCodeOutput;
        }

        function copyGeneratedCode() {
            let codeText = document.getElementById('codeOutputText').innerText;
            if (codeText) {
                navigator.clipboard.writeText(codeText);
                alert("تم نسخ الكود بنجاح!");
            }
        }

        /* ------------------------------------------
           LocalStorage Helper Persistence Methods
           ------------------------------------------ */
        function saveUsersToStorage() {
            localStorage.setItem('n_users_db', JSON.stringify(usersDatabase));
        }

        function saveGroupsToStorage() {
            localStorage.setItem('n_groups_db', JSON.stringify(groupsDatabase));
        }

        function saveChatsToStorage() {
            localStorage.setItem('n_chats_db', JSON.stringify(chatsDatabase));
        }

        /* Modal Helpers */
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('show');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }
    </script>
</body>
